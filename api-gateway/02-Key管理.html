<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key 管理 - API 中转平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    body { background: #F8FAFC; }
    input:focus, select:focus { outline: none; box-shadow: 0 0 0 2px rgba(3, 105, 161, 0.3); }
    .sidebar-link { transition: all 0.2s ease; }
    .sidebar-link:hover { background: rgba(15, 23, 42, 0.06); }
    .sidebar-link.active { background: #0F172A; color: white; }
    .sidebar-link.active svg { stroke: white; }
    .stat-row { transition: background 0.15s ease; }
    .stat-row:hover { background: #F8FAFC; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
    .drawer-overlay { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(2px); }
    .tag-permanent { background: #EFF6FF; color: #1D4ED8; }
    .tag-test { background: #FEF3C7; color: #92400E; }
    .tag-active { background: #ECFDF5; color: #065F46; }
    .tag-stopped { background: #FEF2F2; color: #991B1B; }
  </style>
</head>
<body>

<div x-data="app" class="min-h-screen bg-[#F8FAFC] flex">

  <!-- ═══════════════════ SIDEBAR ═══════════════════ -->
  <aside class="hidden lg:flex lg:flex-col w-56 bg-white border-r border-[#E2E8F0] shrink-0">
    <div class="h-14 flex items-center justify-between px-4 border-b border-[#E2E8F0] relative" @click.outside="userMenuOpen = false">
      <div class="flex items-center gap-2">
        <div class="size-6 rounded-md bg-[#0F172A] flex items-center justify-center">
          <svg class="size-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
        </div>
        <span class="font-semibold text-sm text-[#0F172A] tracking-tight">API 中转平台</span>
      </div>
      <button @click="userMenuOpen = !userMenuOpen" class="size-7 rounded-full bg-[#0369A1] flex items-center justify-center text-white text-[11px] font-semibold hover:ring-2 ring-[#0369A1]/30 transition-all cursor-pointer">孙</button>
      <div x-show="userMenuOpen" x-cloak x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" class="absolute top-full left-3 right-3 mt-1 bg-white rounded-xl shadow-lg border border-[#E2E8F0] py-1.5 z-50">
        <div class="px-3 py-2 border-b border-[#F1F5F9]">
          <div class="text-sm font-medium text-[#0F172A]">孙楠迪</div>
          <div class="text-xs text-[#64748B]">管理员</div>
        </div>
        <button @click="userMenuOpen = false" class="w-full flex items-center gap-2.5 px-3 py-2 text-sm text-[#64748B] hover:bg-[#F8FAFC] transition-colors cursor-pointer">
          <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
          个人资料
        </button>
        <button @click="handleLogout" class="w-full flex items-center gap-2.5 px-3 py-2 text-sm text-red-500 hover:bg-red-50 transition-colors cursor-pointer">
          <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
          退出登录
        </button>
      </div>
    </div>
    <nav class="flex-1 p-2.5 space-y-0.5">
      <a href="#" @click.prevent="page='dashboard'" class="sidebar-link flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium text-[#64748B]">
        <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625z"/></svg>
        <span>统计看板</span>
      </a>
      <a href="#" @click.prevent="page='keys'" class="sidebar-link flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium" :class="page==='keys' ? 'active' : 'text-[#64748B]'">
        <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z"/></svg>
        <span>Key 管理</span>
      </a>
      <a href="#" @click.prevent="page='customers'" class="sidebar-link flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium text-[#64748B]">
        <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
        <span>客户库</span>
      </a>
      <a href="#" @click.prevent="page='employees'" class="sidebar-link flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium text-[#64748B]">
        <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
        <span>员工管理</span>
      </a>
      <a href="#" @click.prevent="page='settings'" class="sidebar-link flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium text-[#64748B]">
        <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <span>系统设置</span>
      </a>
    </nav>
    <div class="p-3 border-t border-[#E2E8F0] flex items-center gap-2.5">
      <div class="size-7 rounded-full bg-[#0369A1] flex items-center justify-center text-white text-[11px] font-semibold">孙</div>
      <div class="flex-1"><div class="text-sm font-medium text-[#0F172A]">孙楠迪</div><div class="text-xs text-[#64748B]">管理员</div></div>
    </div>
  </aside>

  <!-- ═══════════════════ MAIN ═══════════════════ -->
  <main class="flex-1 min-w-0">
    <div class="px-4 md:px-6 lg:px-8 py-6 lg:py-8 max-w-7xl mx-auto">

      <!-- KEY MANAGEMENT PAGE -->
      <div x-show="page==='keys'">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
          <div><h1 class="text-xl font-semibold text-[#0F172A]">Key 管理</h1><p class="text-sm text-[#64748B] mt-0.5">管理所有 API 密钥</p></div>
          <div class="flex items-center gap-2.5">
            <button @click="openSingleDrawer" class="h-9 px-4 rounded-lg bg-[#0F172A] text-white text-sm font-medium hover:bg-[#1E293B] active:scale-[0.98] cursor-pointer flex items-center gap-2">+ 生成 Key</button>
            <button @click="openBatchDrawer" class="h-9 px-4 rounded-lg border border-[#E2E8F0] bg-white text-sm font-medium text-[#334155] hover:bg-[#F8FAFC] active:scale-[0.98] cursor-pointer">批量生成</button>
          </div>
        </div>

        <!-- Search + Filters -->
        <div class="flex items-center gap-3 mb-5 flex-wrap">
          <div class="relative flex-1 min-w-[200px] max-w-md">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 size-4 text-[#94A3B8]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
            <input type="text" x-model="search" placeholder="搜索 Key 或客户名称..." class="w-full h-9 pl-9 pr-3 rounded-lg border border-[#E2E8F0] bg-white text-sm text-[#0F172A] placeholder:text-[#94A3B8] focus:border-[#0369A1]">
          </div>
          <select x-model="filterType" class="h-9 px-3 rounded-lg border border-[#E2E8F0] bg-white text-sm text-[#334155] cursor-pointer">
            <option value="">全部类型</option><option value="permanent">永久 Key</option><option value="test">测试 Key</option>
          </select>
          <select x-model="filterStatus" class="h-9 px-3 rounded-lg border border-[#E2E8F0] bg-white text-sm text-[#334155] cursor-pointer">
            <option value="">全部状态</option><option value="enabled">已启用</option><option value="disabled">已停用</option>
          </select>
          <select x-model="filterCreator" class="h-9 px-3 rounded-lg border border-[#E2E8F0] bg-white text-sm text-[#334155] cursor-pointer">
            <option value="">全部创建者</option><option value="孙楠迪">孙楠迪</option><option value="张工">张工</option><option value="李工">李工</option>
          </select>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-xl border border-[#E2E8F0] overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead><tr class="border-b border-[#E2E8F0] bg-[#F8FAFC]">
                <th class="w-10 px-4 py-3"><input type="checkbox" @change="selectAll($event)" :checked="allSelected" class="rounded border-[#CBD5E1] text-[#0369A1] cursor-pointer"></th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-[#64748B]">Key</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-[#64748B]">客户名称</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-[#64748B]">类型</th>
                <th class="text-right px-4 py-3 text-xs font-semibold text-[#64748B]">额度</th>
                <th class="text-right px-4 py-3 text-xs font-semibold text-[#64748B]">剩余</th>
                <th class="text-center px-4 py-3 text-xs font-semibold text-[#64748B]">状态</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-[#64748B]">创建者</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-[#64748B]">创建时间</th>
                <th class="text-center px-4 py-3 text-xs font-semibold text-[#64748B]">操作</th>
              </tr></thead>
              <tbody>
                <template x-for="k in filtered" :key="k.id">
                  <tr class="stat-row border-b border-[#F1F5F9] last:border-0">
                    <td class="px-4 py-3"><input type="checkbox" :value="k.id" x-model="selected" class="rounded border-[#CBD5E1] text-[#0369A1] cursor-pointer"></td>
                    <td class="px-4 py-3">
                      <div class="flex items-center gap-1.5">
                        <span class="text-sm font-mono text-[#0F172A]" x-text="k.preview"></span>
                        <button @click="copyText(k.key)" class="text-[#94A3B8] hover:text-[#0369A1] cursor-pointer" title="复制">
                          <svg class="size-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184"/></svg>
                        </button>
                      </div>
                    </td>
                    <td class="px-4 py-3 text-sm text-[#0F172A]" x-text="k.customer"></td>
                    <td class="px-4 py-3"><span class="text-xs font-medium px-2 py-0.5 rounded-full" :class="k.type==='permanent'?'tag-permanent':'tag-test'" x-text="k.type==='permanent'?'永久':'测试'"></span></td>
                    <td class="px-4 py-3 text-sm text-right font-mono text-[#0F172A]" x-text="k.type==='permanent'?'无限':'¥'+k.quota"></td>
                    <td class="px-4 py-3 text-sm text-right font-mono text-[#0F172A]" x-text="k.type==='permanent'?'—':'¥'+k.remaining"></td>
                    <td class="px-4 py-3 text-center"><span class="text-xs font-medium px-2 py-0.5 rounded-full" :class="k.status==='enabled'?'tag-active':'tag-stopped'" x-text="k.status==='enabled'?'已启用':'已停用'"></span></td>
                    <td class="px-4 py-3 text-sm text-[#64748B]" x-text="k.creator"></td>
                    <td class="px-4 py-3 text-sm text-[#64748B]" x-text="k.date"></td>
                    <td class="px-4 py-3">
                      <div class="flex justify-center gap-1">
                        <button @click="showDetail(k)" class="px-2 py-1 text-xs rounded hover:bg-gray-100 text-[#64748B] cursor-pointer">详情</button>
                        <button @click="copyText(k.key)" class="px-2 py-1 text-xs rounded hover:bg-blue-50 text-[#64748B] cursor-pointer">复制</button>
                        <button @click="toggleOnOff(k.id)" class="px-2 py-1 text-xs rounded cursor-pointer" :class="k.status==='enabled'?'text-amber-600 hover:bg-amber-50':'text-green-600 hover:bg-green-50'" x-text="k.status==='enabled'?'停用':'启用'"></button>
                        <button @click="removeKey(k.id)" class="px-2 py-1 text-xs text-red-500 rounded hover:bg-red-50 cursor-pointer">删除</button>
                      </div>
                    </td>
                  </tr>
                </template>
                <tr x-show="filtered.length===0"><td colspan="10" class="px-4 py-12 text-center text-sm text-[#94A3B8]">暂无匹配的 Key</td></tr>
              </tbody>
            </table>
          </div>

          <!-- Batch bar -->
          <div x-show="selected.length > 0" x-cloak class="px-4 py-3 bg-[#F8FAFC] border-t border-[#E2E8F0] flex items-center justify-between">
            <span class="text-sm text-[#64748B]">已选 <b class="text-[#0F172A]" x-text="selected.length"></b> 项</span>
            <div class="flex gap-2">
              <button @click="batchDo('disable')" class="h-8 px-4 rounded-lg border border-[#E2E8F0] bg-white text-sm text-[#D97706] hover:bg-amber-50 cursor-pointer">批量停用</button>
              <button @click="batchDo('enable')" class="h-8 px-4 rounded-lg border border-[#E2E8F0] bg-white text-sm text-[#059669] hover:bg-green-50 cursor-pointer">批量启用</button>
            </div>
          </div>

          <!-- Pagination -->
          <div class="px-4 py-3 border-t border-[#E2E8F0] flex items-center justify-between text-sm text-[#64748B]">
            <span>共 <span x-text="filtered.length"></span> 条</span>
          </div>
        </div>
      </div>

      <!-- OTHER PAGES (placeholder) -->
      <div x-show="page!=='keys'" class="flex items-center justify-center h-96 text-[#94A3B8] text-sm">建设中，请点击侧边栏「Key 管理」</div>
    </div>
  </main>

  <!-- ═══════════════════ DRAWER: Single Generate ═══════════════════ -->
  <div x-show="drawer==='single'" x-cloak class="fixed inset-0 z-50">
    <div class="absolute inset-0 drawer-overlay" @click="drawer=null"></div>
    <div class="absolute right-0 top-0 bottom-0 w-full max-w-lg bg-white shadow-2xl flex flex-col" x-show="drawer==='single'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
      <div class="flex items-center justify-between px-6 py-5 border-b border-[#E2E8F0]">
        <div><h2 class="text-lg font-semibold text-[#0F172A]">生成 Key</h2><p class="text-sm text-[#64748B] mt-0.5">为指定客户创建一个新的 API Key</p></div>
        <button @click="drawer=null" class="size-8 rounded-lg hover:bg-[#F1F5F9] flex items-center justify-center cursor-pointer"><svg class="size-5 text-[#94A3B8]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div class="flex-1 overflow-y-auto p-6 space-y-5">
        <div>
          <label class="block text-sm font-medium text-[#334155] mb-1.5">客户名称 <span class="text-red-400">*</span></label>
          <div class="relative">
            <input type="text" x-model="form.customer" @input="suggest(form)" placeholder="输入客户名称..." class="w-full h-10 px-3.5 rounded-lg border border-[#E2E8F0] bg-white text-sm text-[#0F172A] placeholder:text-[#94A3B8] focus:border-[#0369A1]">
            <div x-show="form.sug.length > 0" x-cloak class="absolute top-full left-0 right-0 mt-1 bg-white rounded-lg border border-[#E2E8F0] shadow-lg z-10 max-h-48 overflow-y-auto">
              <template x-for="c in form.sug" :key="c"><button @click="form.customer=c; form.sug=[]" class="w-full text-left px-3.5 py-2.5 text-sm text-[#0F172A] hover:bg-[#F8FAFC] border-b border-[#F1F5F9] last:border-0 cursor-pointer" x-text="c"></button></template>
            </div>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-[#334155] mb-1.5">Key 类型 <span class="text-red-400">*</span></label>
          <div class="flex gap-2">
            <button @click="form.keyType='permanent'" class="flex-1 h-10 rounded-lg border text-sm font-medium cursor-pointer" :class="form.keyType==='permanent'?'border-[#0369A1] bg-[#0369A1]/5 text-[#0369A1]':'border-[#E2E8F0] bg-white text-[#64748B] hover:border-[#CBD5E1]'">永久 Key</button>
            <button @click="form.keyType='test'" class="flex-1 h-10 rounded-lg border text-sm font-medium cursor-pointer" :class="form.keyType==='test'?'border-[#0369A1] bg-[#0369A1]/5 text-[#0369A1]':'border-[#E2E8F0] bg-white text-[#64748B] hover:border-[#CBD5E1]'">测试 Key</button>
          </div>
        </div>
        <div x-show="form.keyType==='test'">
          <label class="block text-sm font-medium text-[#334155] mb-1.5">额度（元）</label>
          <div class="relative"><span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm text-[#94A3B8]">¥</span><input type="number" x-model="form.quota" step="0.01" min="0.01" class="w-full h-10 pl-7 pr-3.5 rounded-lg border border-[#E2E8F0] bg-white text-sm text-[#0F172A] focus:border-[#0369A1]"></div>
        </div>
        <div><label class="block text-sm font-medium text-[#334155] mb-1.5">备注</label><input type="text" x-model="form.note" placeholder="选填" class="w-full h-10 px-3.5 rounded-lg border border-[#E2E8F0] bg-white text-sm text-[#0F172A] placeholder:text-[#94A3B8] focus:border-[#0369A1]"></div>
      </div>
      <div class="px-6 py-4 border-t border-[#E2E8F0] flex items-center gap-3">
        <button @click="drawer=null" class="flex-1 h-10 rounded-lg border border-[#E2E8F0] bg-white text-sm font-medium text-[#64748B] hover:bg-[#F8FAFC] cursor-pointer">取消</button>
        <button @click="doGenerate" class="flex-1 h-10 rounded-lg bg-[#0F172A] text-white text-sm font-medium hover:bg-[#1E293B] active:scale-[0.98] cursor-pointer">确认生成</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ DRAWER: Batch Generate ═══════════════════ -->
  <div x-show="drawer==='batch'" x-cloak class="fixed inset-0 z-50">
    <div class="absolute inset-0 drawer-overlay" @click="drawer=null"></div>
    <div class="absolute right-0 top-0 bottom-0 w-full max-w-lg bg-white shadow-2xl flex flex-col" x-show="drawer==='batch'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
      <div class="flex items-center justify-between px-6 py-5 border-b border-[#E2E8F0]">
        <div><h2 class="text-lg font-semibold text-[#0F172A]">批量生成 Key</h2><p class="text-sm text-[#64748B] mt-0.5">一次性创建 10-100 个 Key</p></div>
        <button @click="drawer=null" class="size-8 rounded-lg hover:bg-[#F1F5F9] flex items-center justify-center cursor-pointer"><svg class="size-5 text-[#94A3B8]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div class="flex-1 overflow-y-auto p-6 space-y-5">
        <div>
          <label class="block text-sm font-medium text-[#334155] mb-1.5">客户名称 <span class="text-red-400">*</span></label>
          <div class="relative">
            <input type="text" x-model="batch.customer" @input="suggestBatch" placeholder="输入客户名称..." class="w-full h-10 px-3.5 rounded-lg border border-[#E2E8F0] bg-white text-sm text-[#0F172A] placeholder:text-[#94A3B8] focus:border-[#0369A1]">
            <div x-show="batch.sug.length > 0" x-cloak class="absolute top-full left-0 right-0 mt-1 bg-white rounded-lg border border-[#E2E8F0] shadow-lg z-10 max-h-48 overflow-y-auto">
              <template x-for="c in batch.sug" :key="c"><button @click="batch.customer=c; batch.sug=[]" class="w-full text-left px-3.5 py-2.5 text-sm text-[#0F172A] hover:bg-[#F8FAFC] border-b border-[#F1F5F9] last:border-0 cursor-pointer" x-text="c"></button></template>
            </div>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-[#334155] mb-1.5">Key 类型 <span class="text-red-400">*</span></label>
          <div class="flex gap-2">
            <button @click="batch.keyType='permanent'" class="flex-1 h-10 rounded-lg border text-sm font-medium cursor-pointer" :class="batch.keyType==='permanent'?'border-[#0369A1] bg-[#0369A1]/5 text-[#0369A1]':'border-[#E2E8F0] bg-white text-[#64748B] hover:border-[#CBD5E1]'">永久 Key</button>
            <button @click="batch.keyType='test'" class="flex-1 h-10 rounded-lg border text-sm font-medium cursor-pointer" :class="batch.keyType==='test'?'border-[#0369A1] bg-[#0369A1]/5 text-[#0369A1]':'border-[#E2E8F0] bg-white text-[#64748B] hover:border-[#CBD5E1]'">测试 Key</button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-[#334155] mb-1.5">生成数量 <span class="text-red-400">*</span></label>
          <input type="number" x-model="batch.count" min="10" max="100" class="w-full h-10 px-3.5 rounded-lg border border-[#E2E8F0] bg-white text-sm text-[#0F172A] focus:border-[#0369A1]">
          <p class="text-xs text-[#94A3B8] mt-1">范围：10 - 100 个</p>
        </div>
        <div x-show="batch.keyType==='test'">
          <label class="block text-sm font-medium text-[#334155] mb-1.5">单个额度（元）</label>
          <div class="relative"><span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm text-[#94A3B8]">¥</span><input type="number" x-model="batch.quota" step="0.01" min="0.01" class="w-full h-10 pl-7 pr-3.5 rounded-lg border border-[#E2E8F0] bg-white text-sm text-[#0F172A] focus:border-[#0369A1]"></div>
        </div>
        <div><label class="block text-sm font-medium text-[#334155] mb-1.5">备注</label><input type="text" x-model="batch.note" placeholder="批量 Key 共用备注" class="w-full h-10 px-3.5 rounded-lg border border-[#E2E8F0] bg-white text-sm text-[#0F172A] placeholder:text-[#94A3B8] focus:border-[#0369A1]"></div>
      </div>
      <div class="px-6 py-4 border-t border-[#E2E8F0] flex items-center gap-3">
        <button @click="drawer=null" class="flex-1 h-10 rounded-lg border border-[#E2E8F0] bg-white text-sm font-medium text-[#64748B] hover:bg-[#F8FAFC] cursor-pointer">取消</button>
        <button @click="doBatch" class="flex-1 h-10 rounded-lg bg-[#0F172A] text-white text-sm font-medium hover:bg-[#1E293B] active:scale-[0.98] cursor-pointer">确认生成</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ MODAL: Batch Result ═══════════════════ -->
  <div x-show="resultOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-[#0F172A]/30 backdrop-blur-sm" @click="resultOpen=false"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col" x-show="resultOpen" x-transition>
      <div class="px-6 py-5 bg-gradient-to-r from-emerald-500 to-emerald-600 rounded-t-2xl text-white">
        <div class="flex items-center gap-3">
          <div class="size-10 rounded-full bg-white/20 flex items-center justify-center"><svg class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg></div>
          <div><h2 class="text-lg font-semibold">生成成功</h2><p class="text-sm text-white/80" x-text="resultMsg"></p></div>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto p-6">
        <div class="overflow-x-auto rounded-lg border border-[#E2E8F0]">
          <table class="w-full">
            <thead><tr class="border-b border-[#E2E8F0] bg-[#F8FAFC]">
              <th class="text-left px-3 py-2.5 text-xs font-semibold text-[#64748B]">Key</th>
              <th class="text-left px-3 py-2.5 text-xs font-semibold text-[#64748B]">客户</th>
              <th class="text-center px-3 py-2.5 text-xs font-semibold text-[#64748B]">类型</th>
              <th class="text-right px-3 py-2.5 text-xs font-semibold text-[#64748B]">额度</th>
            </tr></thead>
            <tbody>
              <template x-for="r in resultKeys" :key="r.id">
                <tr class="border-b border-[#F1F5F9] last:border-0">
                  <td class="px-3 py-2.5 text-sm font-mono text-[#0F172A]" x-text="r.key"></td>
                  <td class="px-3 py-2.5 text-sm text-[#0F172A]" x-text="r.customer"></td>
                  <td class="px-3 py-2.5 text-center"><span class="text-xs font-medium px-1.5 py-0.5 rounded-full" :class="r.type==='permanent'?'tag-permanent':'tag-test'" x-text="r.type==='permanent'?'永久':'测试'"></span></td>
                  <td class="px-3 py-2.5 text-sm text-right font-mono text-[#0F172A]" x-text="r.type==='permanent'?'无限':'¥'+r.quota"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
      <div class="px-6 py-4 border-t border-[#E2E8F0] flex items-center gap-3">
        <button @click="exportCSV" class="h-10 px-5 rounded-lg border border-[#E2E8F0] bg-white text-sm font-medium text-[#334155] hover:bg-[#F8FAFC] cursor-pointer flex items-center gap-2">↓ 一键导出 CSV</button>
        <button @click="resultOpen=false" class="flex-1 h-10 rounded-lg bg-[#0F172A] text-white text-sm font-medium hover:bg-[#1E293B] cursor-pointer">返回 Key 列表</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ DRAWER: Key Detail ═══════════════════ -->
  <div x-show="detailOpen" x-cloak class="fixed inset-0 z-50">
    <div class="absolute inset-0 drawer-overlay" @click="detailOpen=false"></div>
    <div class="absolute right-0 top-0 bottom-0 w-full max-w-lg bg-white shadow-2xl flex flex-col" x-show="detailOpen" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
      <div class="flex items-center justify-between px-6 py-5 border-b border-[#E2E8F0]">
        <div><h2 class="text-lg font-semibold text-[#0F172A]">Key 详情</h2><p class="text-sm text-[#94A3B8] mt-0.5">创建于 <span x-text="d ? d.date : ''"></span></p></div>
        <button @click="detailOpen=false" class="size-8 rounded-lg hover:bg-[#F1F5F9] flex items-center justify-center cursor-pointer"><svg class="size-5 text-[#94A3B8]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div class="flex-1 overflow-y-auto p-6 space-y-6">
        <div class="bg-[#F8FAFC] rounded-xl p-4 border border-[#E2E8F0]">
          <div class="text-xs text-[#94A3B8] mb-1">API Key</div>
          <div class="flex items-center gap-2"><code class="text-sm font-mono text-[#0F172A] break-all" x-text="d ? d.key : ''"></code><button @click="d ? copyText(d.key) : null" class="shrink-0 size-8 rounded-lg bg-[#0F172A] flex items-center justify-center hover:bg-[#1E293B] cursor-pointer"><svg class="size-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184"/></svg></button></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-white rounded-xl p-3 border border-[#E2E8F0]"><div class="text-xs text-[#94A3B8] mb-0.5">客户名称</div><div class="text-sm font-medium text-[#0F172A]" x-text="d ? d.customer : ''"></div></div>
          <div class="bg-white rounded-xl p-3 border border-[#E2E8F0]"><div class="text-xs text-[#94A3B8] mb-0.5">Key 类型</div><span class="text-xs font-medium px-2 py-0.5 rounded-full" :class="(d&&d.type==='permanent')?'tag-permanent':'tag-test'" x-text="d?(d.type==='permanent'?'永久 Key':'测试 Key'):''"></span></div>
          <div class="bg-white rounded-xl p-3 border border-[#E2E8F0]"><div class="text-xs text-[#94A3B8] mb-0.5">总额度</div><div class="text-sm font-semibold text-[#0F172A]" x-text="d?(d.type==='permanent'?'无限':'¥'+d.quota):''"></div></div>
          <div class="bg-white rounded-xl p-3 border border-[#E2E8F0]"><div class="text-xs text-[#94A3B8] mb-0.5">剩余额度</div><div class="text-sm font-semibold text-[#0F172A]" x-text="d?(d.type==='permanent'?'—':'¥'+d.remaining):''"></div></div>
          <div class="bg-white rounded-xl p-3 border border-[#E2E8F0]"><div class="text-xs text-[#94A3B8] mb-0.5">状态</div><span class="text-xs font-medium px-2 py-0.5 rounded-full" :class="(d&&d.status==='enabled')?'tag-active':'tag-stopped'" x-text="d?(d.status==='enabled'?'已启用':'已停用'):''"></span></div>
          <div class="bg-white rounded-xl p-3 border border-[#E2E8F0]"><div class="text-xs text-[#94A3B8] mb-0.5">创建者</div><div class="text-sm font-medium text-[#0F172A]" x-text="d ? d.creator : ''"></div></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
document.addEventListener('alpine:init', () => {
  const customers = ['明远科技', '富士康精密', '恒通数据', '云智科技', '鼎新制造', '东方电气'];

  // Build mock keys (simplified)
  const keys = [];
  const types = ['permanent','test','test'];
  const quotas = [50, 100, 200, 500, 1000];
  const names = ['孙楠迪', '张工', '李工', '孙楠迪', '张工', '李工'];
  for (let i = 0; i < 40; i++) {
    const k = 'sk-' + Math.random().toString(36).slice(2,10) + '-' + Math.random().toString(36).slice(2,10);
    const tp = types[i % 3];
    const q = tp === 'test' ? quotas[i % 5] : null;
    keys.push({
      id: i+1,
      key: k,
      preview: k.slice(0,16) + '\u2026',
      customer: customers[i % 6],
      type: tp,
      quota: q,
      remaining: tp === 'test' ? Math.max(0, q - Math.floor(Math.random() * q * 0.5)) : null,
      status: i % 7 === 0 ? 'disabled' : 'enabled',
      creator: names[i % 6],
      date: '2026-05-' + String(Math.max(1, 14 - Math.floor(Math.random() * 14))).padStart(2,'0'),
    });
  }

  Alpine.data('app', () => ({
    page: 'keys',
    userMenuOpen: false,
    drawer: null,
    search: '',
    filterType: '',
    filterStatus: '',
    filterCreator: '',
    selected: [],
    allKeys: keys,

    // Single form
    form: { customer: '', keyType: 'test', quota: '2.00', note: '', sug: [] },

    // Batch form
    batch: { customer: '', keyType: 'test', count: '50', quota: '2.00', note: '', sug: [] },

    // Results
    resultOpen: false,
    resultMsg: '',
    resultKeys: [],

    // Detail
    detailOpen: false,
    d: null,

    // ── Computed ──
    get filtered() {
      let list = this.allKeys;
      if (this.search) { const q = this.search.toLowerCase(); list = list.filter(k => k.key.includes(q) || k.customer.toLowerCase().includes(q)); }
      if (this.filterType) list = list.filter(k => k.type === this.filterType);
      if (this.filterStatus) list = list.filter(k => k.status === this.filterStatus);
      if (this.filterCreator) list = list.filter(k => k.creator === this.filterCreator);
      return list;
    },
    get allSelected() {
      return this.filtered.length > 0 && this.selected.length === this.filtered.length;
    },

    // ── Methods ──
    selectAll(e) { this.selected = e.target.checked ? this.filtered.map(k => k.id) : []; },
    copyText(t) { navigator.clipboard.writeText(t).then(() => alert('已复制')); },
    toggleOnOff(id) { const k = this.allKeys.find(k => k.id === id); if (k) k.status = k.status === 'enabled' ? 'disabled' : 'enabled'; },
    removeKey(id) { if (confirm('确定删除？')) this.allKeys = this.allKeys.filter(k => k.id !== id); },
    batchDo(act) {
      const ids = this.selected;
      this.allKeys.forEach(k => { if (ids.includes(k.id)) k.status = act === 'enable' ? 'enabled' : 'disabled'; });
      this.selected = [];
    },

    suggest(f) { f.sug = f.customer.length >= 2 ? customers.filter(c => c.includes(f.customer)) : []; },
    suggestBatch() { this.batch.sug = this.batch.customer.length >= 2 ? customers.filter(c => c.includes(this.batch.customer)) : []; },

    openSingleDrawer() { this.form = { customer: '', keyType: 'test', quota: '2.00', note: '', sug: [] }; this.drawer = 'single'; },
    openBatchDrawer() { this.batch = { customer: '', keyType: 'test', count: '50', quota: '2.00', note: '', sug: [] }; this.drawer = 'batch'; },

    doGenerate() {
      if (!this.form.customer) return alert('请填写客户名称');
      const k = 'sk-' + Math.random().toString(36).slice(2,10) + '-' + Math.random().toString(36).slice(2,10);
      this.allKeys.unshift({
        id: Date.now(), key: k, preview: k.slice(0,16) + '\u2026',
        customer: this.form.customer, type: this.form.keyType,
        quota: this.form.keyType==='test' ? parseFloat(this.form.quota) : null,
        remaining: this.form.keyType==='test' ? parseFloat(this.form.quota) : null,
        status: 'enabled', creator: '孙楠迪', date: new Date().toISOString().slice(0,10),
      });
      this.drawer = null;
    },

    doBatch() {
      if (!this.batch.customer) return alert('请填写客户名称');
      const n = parseInt(this.batch.count);
      if (n < 10 || n > 100) return alert('数量需在 10-100');
      const result = [];
      for (let i = 0; i < n; i++) {
        const k = 'sk-' + Math.random().toString(36).slice(2,10) + '-' + Math.random().toString(36).slice(2,10);
        result.push({ id: Date.now()+i, key: k, customer: this.batch.customer, type: this.batch.keyType, quota: this.batch.keyType==='test' ? parseFloat(this.batch.quota) : null });
        this.allKeys.unshift({
          id: Date.now()+i, key: k, preview: k.slice(0,16) + '\u2026',
          customer: this.batch.customer, type: this.batch.keyType,
          quota: this.batch.keyType==='test' ? parseFloat(this.batch.quota) : null,
          remaining: this.batch.keyType==='test' ? parseFloat(this.batch.quota) : null,
          status: 'enabled', creator: '孙楠迪', date: new Date().toISOString().slice(0,10),
        });
      }
      this.resultMsg = this.batch.keyType==='test' ? '已成功生成 ' + n + ' 个 Key，总额度 ¥' + (parseFloat(this.batch.quota)*n).toFixed(2) + ' 元' : '已成功生成 ' + n + ' 个 Key';
      this.resultKeys = result;
      this.drawer = null;
      this.resultOpen = true;
    },

    exportCSV() {
      const h = 'Key,客户名称,类型,额度\n';
      const rows = this.resultKeys.map(r => r.key + ',' + r.customer + ',' + (r.type==='permanent'?'永久':'测试') + ',' + (r.type==='permanent'?'无限':'¥'+r.quota)).join('\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([h+rows], {type:'text/csv'}));
      a.download = this.resultKeys[0].customer + '-Key批量-' + new Date().toISOString().slice(0,10) + '.csv';
      a.click();
    },

    showDetail(k) { this.d = k; this.detailOpen = true; },

    handleLogout() {
      this.userMenuOpen = false;
      window.location.href = '01-登录与看板.html';
    },
  }));
});
</script>
</body>
</html>
